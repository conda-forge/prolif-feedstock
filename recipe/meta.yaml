{% set name = "prolif" %}
{% set version = "2.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/prolif-{{ version }}.tar.gz
  sha256: 345d2dd8f57d6b56443a7a264ab8b8965fdb4936554a7a137e8d70ab6e14c186

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python {{ python_min }}
    - rdkit
  run:
    - python >={{ python_min }}
    - pandas >=1.1.0
    - numpy >=1.13.3
    - scipy >=1.3.0
    - mdanalysis >=2.7.0
    - tqdm
    - rdkit >=2021.03.1
    - multiprocess
    - dill
    - networkx >=2.5.0
    - psutil

test:
  imports:
    - prolif
  commands:
    - pip check
    - pytest
  requires:
    - pip
    - pytest >=6.1.2
    - ipython
    - py3Dmol
    - matplotlib >=3.5
    - python {{ python_min }}
  source_files:
    - tests/

about:
  home: https://github.com/chemosim-lab/ProLIF
  summary: Protein-Ligand Interaction Fingerprints
  dev_url: https://github.com/chemosim-lab/ProLIF/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - cbouy
